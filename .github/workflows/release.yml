name: "Publish Release"

on:
  push:
    tags:
      - 'v*' # Spustí sa iba vtedy, keď pushneš tag začínajúci na 'v' (napr. v0.2.0)

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
          - platform: 'ubuntu-22.04' # Pre Linux je stabilnejšie použiť staršie Ubuntu kvôli spätnej kompatibilite glibc
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Linux vyžaduje dodatočné systémové knižnice pre Tauri webview a grafiku
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}
      
      - name: Install frontend dependencies
        run: npm install 

      # Build Rust binary first (portable packaging needs the binary at known path)
      - name: Build Rust binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      # Extrahovanie release notes z CHANGELOG.md pre aktuálnu verziu
      - name: Extract release notes from CHANGELOG
        id: extract_notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "## \[$version\].*?(?=## \[|\z)"
          $match = [regex]::Match($content, $pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if ($match.Success) {
            $notes = $match.Value.Trim()
            "notes<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "notes=Automatický build pre verziu $tag." | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      # Spustenie buildu cez oficiálnu Tauri akciu
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: ${{ steps.extract_notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Zabalenie prenosnej verzie (Windows)
      - name: Package Portable Version (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $appName = "scanner-reloaded"
          $exePath = "src-tauri/target/release/$appName.exe"
          if (Test-Path $exePath) {
            $arch = "x64"
            Compress-Archive -Path $exePath -DestinationPath "src-tauri/target/release/${appName}_${version}_${arch}_portable.zip"
          } else { Write-Error "Nenašiel sa súbor $exePath" }

      # Zabalenie prenosnej verzie (Linux) - zbalí binárku do .tar.gz
      - name: Package Portable Version (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          version="${{ github.ref_name }}" && version="${version#v}"
          appName="scanner-reloaded"
          binaryPath="src-tauri/target/release/$appName"
          if [ -f "$binaryPath" ]; then
            arch="x64"
            tar -czvf "src-tauri/target/release/${appName}_${version}_${arch}_portable.tar.gz" -C src-tauri/target/release "$appName"
          else
            echo "Nenašiel sa súbor $binaryPath" && exit 1
          fi

      # Zabalenie prenosnej verzie (macOS) - zbalí čistú binárku do .zip
      - name: Package Portable Version (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          version="${{ github.ref_name }}" && version="${version#v}"
          appName="scanner-reloaded"
          binaryPath="src-tauri/target/release/$appName"
          if [ -f "$binaryPath" ]; then
            arch=$(uname -m)
            [ "$arch" = "x86_64" ] && arch="x64"
            [ "$arch" = "arm64" ] && arch="aarch64"
            zip -j "src-tauri/target/release/${appName}_${version}_${arch}_portable.zip" "$binaryPath"
          else
            echo "Nenašiel sa súbor $binaryPath" && exit 1
          fi

      # Nahranie prenosných verzií na GitHub Release
      - name: Upload Portable Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/*-portable.zip
            src-tauri/target/release/*-portable.tar.gz
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}