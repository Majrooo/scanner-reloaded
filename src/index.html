<!DOCTYPE html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <title>Scanner Reloaded</title>
  </head>
  <body>
    <div class="container">
      <div class="top-bar">
        <label for="language-select" class="language-label" data-i18n="common.languageLabel">Jazyk</label>
        <select id="language-select"></select>
      </div>

      <div id="disk-screen">
        <h1 id="disk-screen-title" data-i18n="diskScreen.title">Vyberte disk na analýzu</h1>
        <div id="disk-list"></div>
      </div>

      <div id="scan-screen" class="hidden">
        <div class="header-row">
          <button id="back-to-disks-btn" data-i18n="scanScreen.backButton">⬅ Späť na disky</button>
          <div id="current-folder-title" class="breadcrumbs-container"></div>
        </div>

        <div id="live-ticker" data-i18n="scanScreen.initializing">Pripravujem skenovanie...</div>

        <div class="filter-control-row">
          <label class="switch-container">
            <input type="checkbox" id="filter-toggle" checked />
            <span class="slider"></span>
          </label>
          <span class="filter-label-text" data-i18n="scanScreen.filterLabel">Skryť drobné súbory a zložky (Rýchly režim)</span>
        </div>

        <div id="chart-layout">
          <div id="chart-container">
            <svg id="sunburst-chart"></svg>
            <div id="center-info">
              <div id="center-icon">📁</div>
              <div id="center-name">..</div>
              <div id="center-size">0 MB</div>
            </div>
          </div>

          <div id="hover-panel">
            <div id="hover-path" data-i18n="scanScreen.hoverPlaceholder">Ukaž myšou na priečinok...</div>
            <div id="hover-size"></div>
            <div id="hover-stats"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="/d3.min.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
